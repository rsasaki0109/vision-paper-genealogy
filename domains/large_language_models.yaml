    code: null
    stars: null
    open_source: closed
    license: null
    tags: [decoder, autoregressive, few-shot, scaling]
    parents:
      - name: "GPT-2"
        relation: extends
    description: "175B parameter model showing emergent few-shot learning capabilities"

  - name: "InstructGPT"
    paper: "Training language models to follow instructions with human feedback"
    arxiv: "2203.02155"
    year: 2022
    code: null
    stars: null
    open_source: closed
    license: null
    tags: [decoder, rlhf, instruction-following, alignment]
    parents:
      - name: "GPT-3"
        relation: extends
    description: "Aligns GPT-3 to follow instructions via supervised fine-tuning and RLHF"

  - name: "GPT-4"
    paper: "GPT-4 Technical Report"
    arxiv: "2303.08774"
    year: 2023
    code: null
    stars: null
    open_source: closed
    license: null
    tags: [decoder, multimodal, reasoning, proprietary]
    parents:
      - name: "GPT-3"
        relation: extends
    description: "Multimodal large language model with strong reasoning across diverse tasks"

  # === Scaling Laws & Efficiency ===
  - name: "Chinchilla"
