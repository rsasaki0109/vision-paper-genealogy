name: Large Language Models
description: >
  The genealogy of large language models — from the Transformer architecture
  through the BERT/GPT era to modern open-weight models and beyond.
source_awesome_lists:
  - https://github.com/Hannibal046/Awesome-LLM
  - https://github.com/RUCAIBox/LLMSurvey

methods:
  # === Foundations ===
  - name: "Transformer"
    paper: "Attention Is All You Need"
    arxiv: "1706.03762"
    year: 2017
    code: "tensorflow/tensor2tensor"
    stars: 15500
    open_source: open
    license: "Apache-2.0"
    tags: [attention, architecture, seq2seq]
    parents: []
    description: "Self-attention-based architecture that replaced recurrence for sequence modeling"

  # === Encoder Models ===
  - name: "BERT"
    paper: "BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding"
    arxiv: "1810.04805"
    year: 2018
    code: "google-research/bert"
    stars: 38500
    open_source: open
    license: "Apache-2.0"
    tags: [encoder, masked-lm, pretraining]
    parents:
      - name: "Transformer"
        relation: extends
    description: "Bidirectional pretraining via masked language modeling for NLU tasks"

  # === Encoder-Decoder Models ===
  - name: "T5"
    paper: "Exploring the Limits of Transfer Learning with a Unified Text-to-Text Transformer"
    arxiv: "1910.10683"
    year: 2020
    code: "google-research/text-to-text-transfer-transformer"
    stars: 6200
    open_source: open
    license: "Apache-2.0"
    tags: [encoder-decoder, text-to-text, pretraining]
    parents:
      - name: "Transformer"
        relation: extends
      - name: "BERT"
        relation: inspires
    description: "Unified text-to-text framework exploring transfer learning at scale"

  # === GPT Family ===
  - name: "GPT-1"
    paper: "Improving Language Understanding by Generative Pre-Training"
    arxiv: null
    year: 2018
    code: null
    stars: null
    open_source: closed
    license: null
    tags: [decoder, autoregressive, pretraining, generative]
    parents:
      - name: "Transformer"
        relation: extends
    description: "First GPT model demonstrating generative pretraining followed by discriminative fine-tuning"

  - name: "GPT-2"
    paper: "Language Models are Unsupervised Multitask Learners"
    arxiv: null
    year: 2019
    code: "openai/gpt-2"
    stars: 22500
    open_source: open
    license: "MIT"
    tags: [decoder, autoregressive, generative]
    parents:
      - name: "GPT-1"
        relation: extends
    description: "Demonstrated zero-shot task transfer with autoregressive language modeling"

  - name: "GPT-3"
    paper: "Language Models are Few-Shot Learners"
