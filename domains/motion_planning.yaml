    code: ""
    stars: 0
    tags: [imitation-learning, autonomous-driving, mid-to-mid, waymo]
    parents: []
    description: "Imitation learning driving policy trained on expert demonstrations with data augmentation via worst-case synthesis"

  - name: "Roach"
    paper: "End-to-End Urban Driving by Imitating a Reinforcement Learning Coach"
    arxiv: "2108.08265"
