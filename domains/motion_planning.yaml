name: Motion Planning
description: >
  From classical sampling-based and search-based planners to learning-based
  motion planning for autonomous driving and mobile robots — covering RRT
  variants, lattice planners, optimization-based methods, and modern
  neural planners.
source_awesome_lists:
  - https://github.com/zhm-real/PathPlanning
  - https://github.com/opendrivelab/End-to-end-Autonomous-Driving
  - https://github.com/autowarefoundation/autoware

methods:
  # ===========================
  # Classical Potential Field
  # ===========================
  - name: "Potential Field"
    paper: "Real-Time Obstacle Avoidance for Manipulators and Mobile Robots"
    arxiv: ""
    year: 1986
    code: ""
    stars: 0
    tags: [reactive, obstacle-avoidance, classical, local-planner]
    parents: []
    description: "Artificial potential field method for reactive obstacle avoidance using attractive and repulsive forces"

  # ===========================
  # Classical Sampling-Based
  # ===========================
  - name: "PRM"
    paper: "Probabilistic Roadmaps for Path Planning in High-Dimensional Configuration Spaces"
    arxiv: ""
    year: 1996
    code: ""
    stars: 0
    tags: [sampling-based, multi-query, graph, classical]
    parents: []
    description: "Probabilistic roadmap planner using random sampling and graph search for multi-query planning"

  - name: "RRT"
    paper: "Rapidly-Exploring Random Trees: A New Tool for Path Planning"
    arxiv: ""
    year: 1998
    code: ""
    stars: 0
    tags: [sampling-based, single-query, tree, classical]
    parents:
      - name: "PRM"
        relation: inspires
    description: "Tree-based incremental planner that rapidly explores configuration spaces via random sampling"

  - name: "RRT-Connect"
    paper: "RRT-Connect: An Efficient Approach to Single-Query Path Planning"
    arxiv: ""
    year: 2000
    code: ""
    stars: 0
    tags: [sampling-based, bidirectional, single-query, classical]
    parents:
      - name: "RRT"
        relation: extends
    description: "Bidirectional RRT variant growing two trees from start and goal for faster single-query planning"

  - name: "RRT*"
    paper: "Sampling-based Algorithms for Optimal Motion Planning"
    arxiv: "1105.1186"
    year: 2011
    code: ""
    stars: 0
    tags: [sampling-based, optimal, asymptotic, classical]
    parents:
      - name: "RRT"
        relation: extends
    description: "Asymptotically optimal variant of RRT with rewiring of the tree structure"

  - name: "InformedRRT*"
    paper: "Informed RRT*: Optimal Sampling-based Path Planning Focused via Direct Sampling of an Admissible Ellipsoidal Heuristic"
    arxiv: "1404.2334"
    year: 2014
    code: ""
    stars: 0
    tags: [sampling-based, optimal, heuristic, classical]
    parents:
      - name: "RRT*"
        relation: extends
    description: "Focuses RRT* sampling to an ellipsoidal subset for faster convergence to optimal paths"

  - name: "BIT*"
    paper: "Batch Informed Trees (BIT*): Sampling-based Optimal Planning via the Heuristically Guided Search of Implicit Random Geometric Graphs"
    arxiv: "1405.5848"
    year: 2015
    code: ""
    stars: 0
    tags: [sampling-based, optimal, batch, heuristic]
    parents:
      - name: "InformedRRT*"
        relation: extends
      - name: "RRT*"
        relation: extends
    description: "Combines graph-based and sampling-based planning using batch processing of implicit random geometric graphs"

  # ===========================
  # Classical Search-Based
  # ===========================
  - name: "A*"
    paper: "A Formal Basis for the Heuristic Determination of Minimum Cost Paths"
    arxiv: ""
    year: 1968
    code: ""
    stars: 0
    tags: [search-based, optimal, heuristic, classical, grid]
    parents: []
    description: "Optimal graph search algorithm using heuristic functions to guide exploration"

  - name: "D*"
    paper: "Optimal and Efficient Path Planning for Partially-Known Environments"
    arxiv: ""
    year: 1994
    code: ""
    stars: 0
    tags: [search-based, dynamic, replanning, classical]
    parents:
      - name: "A*"
        relation: extends
    description: "Dynamic replanning search algorithm for partially known or changing environments"

  - name: "D* Lite"
    paper: "D* Lite"
    arxiv: ""
    year: 2002
    code: ""
    stars: 0
    tags: [search-based, dynamic, replanning, incremental, classical]
    parents:
      - name: "D*"
        relation: replaces
      - name: "A*"
        relation: extends
    description: "Simplified and more efficient incremental replanning algorithm based on Lifelong Planning A*"

  - name: "Hybrid A*"
    paper: "Practical Search Techniques in Path Planning for Autonomous Driving"
    arxiv: ""
    year: 2010
    code: ""
    stars: 0
    tags: [search-based, hybrid, continuous, autonomous-driving, classical]
    parents:
      - name: "A*"
        relation: extends
    description: "Extends A* to continuous state spaces with kinematic constraints for vehicle path planning"

  # ===========================
  # Lattice & Frenet Planners
  # ===========================
  - name: "State Lattice Planner"
    paper: "State Space Sampling of Feasible Motions for High-Performance Mobile Robot Navigation in Complex Environments"
    arxiv: ""
    year: 2009
    code: ""
    stars: 0
    tags: [search-based, lattice, kinodynamic, classical, autonomous-driving]
    parents:
      - name: "A*"
        relation: extends
    description: "Precomputes a lattice of dynamically feasible motion primitives searched with graph-based planners"

  - name: "Frenet Planner"
    paper: "Optimal Trajectory Generation for Dynamic Street Scenarios in a Frenet Frame"
    arxiv: ""
    year: 2010
    code: ""
    stars: 0
    tags: [trajectory-planning, frenet-frame, autonomous-driving, classical]
    parents:
      - name: "State Lattice Planner"
        relation: inspires
    description: "Generates optimal trajectories in Frenet coordinates separating lateral and longitudinal planning"

  # ===========================
  # Optimization-Based Planners
  # ===========================
  - name: "CHOMP"
    paper: "CHOMP: Covariant Hamiltonian Optimization for Motion Planning"
    arxiv: ""
    year: 2009
    code: ""
    stars: 0
    tags: [optimization, trajectory-optimization, covariant, manipulation]
    parents:
      - name: "A*"
        relation: inspires
    description: "Trajectory optimization via covariant gradient descent minimizing smoothness and collision costs"

  - name: "STOMP"
    paper: "STOMP: Stochastic Trajectory Optimization for Motion Planning"
    arxiv: ""
    year: 2011
    code: ""
    stars: 0
    tags: [optimization, stochastic, trajectory-optimization, manipulation]
    parents:
      - name: "CHOMP"
        relation: extends
    description: "Stochastic trajectory optimizer using noisy rollouts to handle non-differentiable cost functions"

  # ===========================
  # Local Planners / Optimization
  # ===========================
  - name: "DWA"
    paper: "The Dynamic Window Approach to Collision Avoidance"
    arxiv: ""
    year: 1997
    code: ""
    stars: 0
    tags: [local-planner, reactive, velocity-space, mobile-robot, classical]
    parents: []
    description: "Reactive collision avoidance by searching velocity space within dynamic constraints"

  - name: "TEB"
    paper: "Trajectory Modification Considering Dynamic Constraints of Autonomous Robots"
    arxiv: ""
    year: 2013
    code: "rst-tu-dortmund/teb_local_planner"
    stars: 1100
    tags: [local-planner, trajectory-optimization, elastic-band, ros]
    parents:
      - name: "DWA"
        relation: replaces
    description: "Timed Elastic Band local planner optimizing trajectory timing and shape under kinodynamic constraints"

  - name: "MPPI"
    paper: "Information Theoretic MPC for Model-Based Reinforcement Learning"
    arxiv: "1707.02342"
    year: 2017
    code: ""
    stars: 0
    tags: [sampling-based, mpc, information-theoretic, model-based]
    parents:
      - name: "DWA"
        relation: inspires
    description: "Model Predictive Path Integral control using sampling-based optimization with information-theoretic cost"

  - name: "MPPI-Generic"
    paper: "MPPI-Generic: A CUDA Library for Stochastic Optimization"
    arxiv: "2409.07563"
    year: 2024
    code: "ACDSLab/MPPI-Generic"
    stars: 200
    tags: [sampling-based, mpc, cuda, gpu, library]
    parents:
      - name: "MPPI"
        relation: extends
    description: "GPU-accelerated CUDA library for MPPI enabling real-time sampling-based MPC on robotics hardware"

  # ===========================
  # Learning-Based Driving Planners
  # ===========================
  - name: "ChauffeurNet"
    paper: "ChauffeurNet: Learning to Drive by Imitating the Best and Synthesizing the Worst"
