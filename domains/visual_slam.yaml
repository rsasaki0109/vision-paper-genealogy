name: Visual SLAM
description: >
  From classical feature-based SLAM to direct methods, learning-based approaches,
  NeRF-based dense SLAM, and Gaussian Splatting SLAM — the full evolution of
  Visual Simultaneous Localization and Mapping.
source_awesome_lists:
  - https://github.com/openMVG/awesome_3DReconstruction_list
  - https://github.com/SilenceOverflow/Awesome-SLAM
  - https://github.com/tzutalin/awesome-visual-slam

methods:
  # ===========================
  # Classical Feature-Based SLAM
  # ===========================
  - name: "MonoSLAM"
    paper: "MonoSLAM: Real-Time Single Camera SLAM"
    arxiv: ""
    year: 2007
    code: ""
    stars: 0
    tags: [monocular, real-time, ekf, feature-based]
    parents: []
    description: "First real-time monocular SLAM using EKF and sparse features"

  - name: "PTAM"
    paper: "Parallel Tracking and Mapping for Small AR Workspaces"
    arxiv: ""
    year: 2007
    code: ""
    stars: 0
    tags: [monocular, keyframe, feature-based, parallel]
    parents:
      - name: "MonoSLAM"
        relation: extends
    description: "Pioneered keyframe-based SLAM with parallel tracking and mapping threads"

  - name: "ORB-SLAM"
    paper: "ORB-SLAM: A Versatile and Accurate Monocular SLAM System"
    arxiv: "1502.00956"
    year: 2015
    code: "raulmur/ORB_SLAM2"
    stars: 9300
    tags: [monocular, feature-based, loop-closure, relocalization]
    parents:
      - name: "PTAM"
        relation: extends
    description: "Feature-based monocular SLAM with ORB features, loop closing, and relocalization"

  - name: "ORB-SLAM2"
    paper: "ORB-SLAM2: An Open-Source SLAM System for Monocular, Stereo, and RGB-D Cameras"
    arxiv: "1610.06475"
    year: 2017
    code: "raulmur/ORB_SLAM2"
    stars: 9300
    tags: [monocular, stereo, rgbd, feature-based, loop-closure]
    parents:
      - name: "ORB-SLAM"
        relation: extends
    description: "Extended ORB-SLAM to stereo and RGB-D cameras with improved mapping"

  - name: "ORB-SLAM3"
    paper: "ORB-SLAM3: An Accurate Open-Source Library for Visual, Visual-Inertial, and Multimap SLAM"
    arxiv: "2007.11898"
    year: 2021
    code: "UZ-SLAMLab/ORB_SLAM3"
    stars: 6600
    tags: [monocular, stereo, rgbd, visual-inertial, multimap, feature-based]
    parents:
      - name: "ORB-SLAM2"
        relation: extends
      - name: "VINS-Mono"
        relation: inspires
    description: "Unified visual, visual-inertial, and multimap SLAM with improved robustness"

  - name: "OpenVSLAM"
    paper: "OpenVSLAM: A Versatile Visual SLAM Framework"
    arxiv: "1910.01122"
    year: 2019
    code: "stella-cv/stella_vslam"
    stars: 1500
    tags: [monocular, stereo, rgbd, feature-based, framework]
    parents:
      - name: "ORB-SLAM2"
        relation: inspires
    description: "Modular visual SLAM framework supporting multiple camera models (continued as stella_vslam)"

  # ===========================
  # Direct Methods
  # ===========================
  - name: "LSD-SLAM"
    paper: "LSD-SLAM: Large-Scale Direct Monocular SLAM"
    arxiv: "1407.4760"
    year: 2014
    code: "tum-vision/lsd_slam"
    stars: 2600
    tags: [monocular, direct, semi-dense, large-scale]
    parents:
      - name: "PTAM"
        relation: inspires
    description: "Large-scale direct monocular SLAM using photometric consistency on semi-dense maps"

  - name: "SVO"
    paper: "SVO: Fast Semi-Direct Monocular Visual Odometry"
    arxiv: "1408.3667"
    year: 2014
    code: "uzh-rpg/rpg_svo_pro_open"
    stars: 3100
    tags: [monocular, semi-direct, fast, visual-odometry]
    parents:
      - name: "PTAM"
        relation: extends
      - name: "LSD-SLAM"
        relation: inspires
    description: "Semi-direct visual odometry combining feature-based and direct methods for high speed"

  - name: "DSO"
    paper: "Direct Sparse Odometry"
    arxiv: "1607.02565"
    year: 2017
    code: "JakobEngel/dso"
    stars: 2200
    tags: [monocular, direct, sparse, visual-odometry, photometric]
    parents:
      - name: "LSD-SLAM"
        relation: extends
    description: "Direct and sparse visual odometry with joint photometric and geometric optimization"

  # ===========================
  # Visual-Inertial SLAM
  # ===========================
  - name: "VINS-Mono"
    paper: "VINS-Mono: A Robust and Versatile Monocular Visual-Inertial State Estimator"
    arxiv: "1708.03852"
    year: 2018
    code: "HKUST-Aerial-Robotics/VINS-Mono"
