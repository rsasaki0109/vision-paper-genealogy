    description: "Tightly-coupled monocular visual-inertial odometry with loop closure"

  - name: "VINS-Fusion"
    paper: "VINS-Fusion: Online Self-Calibration of Multi-Sensor Systems"
    arxiv: ""
    year: 2019
    code: "HKUST-Aerial-Robotics/VINS-Fusion"
    stars: 3400
    tags: [stereo, visual-inertial, multi-sensor, gps-fusion]
    parents:
      - name: "VINS-Mono"
        relation: extends
    description: "Extended VINS-Mono with stereo cameras and GPS fusion for multi-sensor support"

  # ===========================
  # Semantic / Dense SLAM
  # ===========================
  - name: "Kimera"
    paper: "Kimera: An Open-Source Library for Real-Time Metric-Semantic Localization and Mapping"
    arxiv: "1910.02490"
    year: 2020
    code: "MIT-SPARK/Kimera"
    stars: 1800
    tags: [metric-semantic, mesh, real-time, visual-inertial]
    parents:
      - name: "VINS-Mono"
        relation: inspires
      - name: "ORB-SLAM2"
        relation: inspires
    description: "Real-time metric-semantic SLAM producing 3D meshes with semantic labels"

  - name: "RTAB-Map"
    paper: "RTAB-Map as an Open-Source Lidar and Visual SLAM Library for Large-Scale and Long-Term Online Operation"
    arxiv: "1906.02985"
    year: 2019
    code: "introlab/rtabmap"
    stars: 2800
    tags: [rgbd, lidar, visual, loop-closure, long-term, graph-based]
    parents:
      - name: "ORB-SLAM2"
        relation: inspires
    description: "Appearance-based loop closure SLAM supporting RGB-D, stereo, and lidar for large-scale operation"

  # ===========================
  # Learning-Based SLAM
  # ===========================
  - name: "DROID-SLAM"
    paper: "DROID-SLAM: Deep Visual SLAM for Monocular, Stereo, and RGB-D Cameras"
    arxiv: "2108.10869"
    year: 2021
    code: "princeton-vl/DROID-SLAM"
    stars: 1700
    tags: [deep-learning, end-to-end, dense, differentiable, optical-flow]
    parents:
      - name: "ORB-SLAM2"
        relation: replaces
      - name: "DSO"
        relation: inspires
    description: "End-to-end differentiable SLAM using recurrent iterative updates of camera poses and depth"

  - name: "DPVO"
    paper: "Deep Patch Visual Odometry"
    arxiv: "2208.04726"
    year: 2023
    code: "princeton-vl/DPVO"
    stars: 600
    tags: [deep-learning, visual-odometry, patch-based, efficient]
    parents:
      - name: "DROID-SLAM"
        relation: extends
    description: "Efficient deep visual odometry using patch-based recurrent updates"

  # ===========================
  # NeRF-Based Dense SLAM
  # ===========================
  - name: "iMAP"
    paper: "iMAP: Implicit Mapping and Positioning in Real-Time"
    arxiv: "2103.12352"
    year: 2021
    code: ""
    stars: 0
    tags: [implicit, neural, real-time, rgbd, dense-mapping]
    parents:
      - name: "ORB-SLAM2"
        relation: inspires
    description: "First real-time neural implicit representation SLAM using a single MLP as the map"

  - name: "NICE-SLAM"
    paper: "NICE-SLAM: Neural Implicit Scalable Encoding for SLAM"
    arxiv: "2112.12130"
    year: 2022
    code: "cvg/nice-slam"
    stars: 1600
    tags: [implicit, neural, hierarchical, rgbd, dense-mapping]
    parents:
      - name: "iMAP"
        relation: extends
    description: "Hierarchical neural implicit encoding for scalable dense SLAM with multi-level features"

  - name: "Co-SLAM"
    paper: "Co-SLAM: Joint Coordinate and Sparse Parametric Encodings for Neural Real-Time SLAM"
    arxiv: "2304.14377"
    year: 2023
    code: "HengyiWang/Co-SLAM"
    stars: 500
    tags: [implicit, neural, real-time, hash-encoding, dense-mapping]
    parents:
      - name: "NICE-SLAM"
        relation: extends
    description: "Real-time neural SLAM combining coordinate and hash encodings for fast convergence"

  - name: "Point-SLAM"
    paper: "Point-SLAM: Dense Neural Point Cloud-based SLAM"
    arxiv: "2304.04278"
    year: 2023
    code: "eriksandstroem/Point-SLAM"
    stars: 450
    tags: [implicit, neural, point-cloud, dense-mapping, adaptive]
    parents:
      - name: "NICE-SLAM"
        relation: extends
    description: "Neural point cloud SLAM with adaptive point density for detailed dense reconstruction"

  # ===========================
  # 3D Gaussian Splatting SLAM
  # ===========================
  - name: "SplaTAM"
    paper: "SplaTAM: Splat, Track & Map 3D Gaussians for Dense RGB-D SLAM"
    arxiv: "2312.02126"
    year: 2024
    code: "spla-tam/SplaTAM"
