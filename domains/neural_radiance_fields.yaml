  - name: "DreamGaussian"
    paper: "DreamGaussian: Generative Gaussian Splatting for Efficient 3D Content Creation"
    arxiv: "2309.16653"
    year: 2023
    code: "dreamgaussian/dreamgaussian"
    stars: 4200
    tags: [text-to-3d, gaussian-splatting, generation]
    parents:
      - name: "3D Gaussian Splatting"
        relation: extends
      - name: "DreamFusion"
        relation: extends
    description: "Fast 3D generation combining Gaussians with score distillation"

  # === Robustness / In-the-Wild ===
  - name: "NeRF-W"
