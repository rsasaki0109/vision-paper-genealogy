name: Object Tracking
description: 'From classical tracking-by-detection to transformer-based end-to-end
  tracking — covering multi-object tracking (MOT), single-object tracking (SOT), and
  point tracking across video sequences.

  '
source_awesome_lists:
- https://github.com/luanshiyinyang/awesome-tracking
